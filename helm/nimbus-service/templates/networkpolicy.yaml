{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nimbus-service.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nimbus-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nimbus-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from other pods in the same namespace (service-to-service calls)
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
    # Allow Prometheus scraping from the monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
    # Allow ingress from the ALB (dynamic VPC IPs — no pod selector)
    - ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
{{- end }}
