name: CI — Validate Configs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-kubernetes:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          echo "Validating Kubernetes manifests..."
          ERRORS=0
          for f in $(find Kubernetes-Manifests-file argocd -name "*.yaml" -o -name "*.yml" 2>/dev/null); do
            echo "  Checking $f"
            python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))" || ERRORS=$((ERRORS+1))
          done
          if [ $ERRORS -gt 0 ]; then
            echo "FAILED: $ERRORS files with invalid YAML"
            exit 1
          fi
          echo "All YAML files are syntactically valid"

  validate-terraform-jenkins:
    name: Validate Terraform (Jenkins)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform validate
        working-directory: Jenkins-Server-TF
        run: |
          terraform init -backend=false
          terraform validate

  validate-terraform-eks:
    name: Validate Terraform (EKS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform validate
        working-directory: EKS-Terraform
        run: |
          terraform init -backend=false
          terraform validate

  validate-scripts:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check scripts exist and are valid
        run: |
          echo "Checking shell scripts..."
          test -f bootstrap.sh && echo "bootstrap.sh: OK" || echo "bootstrap.sh: MISSING"
          test -f destroy.sh && echo "destroy.sh: OK" || echo "destroy.sh: MISSING"
          test -f Jenkins-Server-TF/tools-install.sh && echo "tools-install.sh: OK" || echo "tools-install.sh: MISSING"
          test -f Jenkins-Server-TF/jcasc/setup-jcasc.sh && echo "setup-jcasc.sh: OK" || echo "setup-jcasc.sh: MISSING"

          echo "Checking Jenkinsfiles..."
          test -f Jenkins-Pipeline-Code/Jenkinsfile-Infrastructure && echo "Jenkinsfile-Infrastructure: OK" || { echo "Jenkinsfile-Infrastructure: MISSING"; exit 1; }
          test -f Jenkins-Pipeline-Code/Jenkinsfile-Nimbus && echo "Jenkinsfile-Nimbus: OK" || { echo "Jenkinsfile-Nimbus: MISSING"; exit 1; }