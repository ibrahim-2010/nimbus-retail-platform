apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: three-tier-database
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/ibrahim-2010/cloud-native-eks.git
    targetRevision: main
    path: Kubernetes-Manifests-file/Database

  destination:
    server: https://kubernetes.default.svc
    namespace: three-tier

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
