apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nimbus-kafka
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ibrahim-2010/nimbus-retail-platform.git
    targetRevision: main
    path: Kubernetes-Manifests-file/Kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   # namespace created by Terraform (helm-strimzi.tf)
