# External Secrets Operator — SecretStore + ExternalSecret CRs
#
# Pre-requisites:
#   1. ESO Helm release deployed (helm-eso.tf)
#   2. IRSA role annotated on ESO service account (helm-eso.tf set block)
#   3. Secrets already exist in AWS Secrets Manager:
#      - nimbus-cluster/nimbus-secrets      (JWT_SECRET, DATABASE_URL, REDIS_URL)
#      - nimbus-cluster/nimbus-catalog-secrets (DATABASE_URL, REDIS_URL)
#
# These ExternalSecrets REPLACE the manually created kubectl secrets from Phase 3.
# ESO reconciles every 1 hour — rotated secrets are picked up automatically.

# ── SecretStore: points ESO at Secrets Manager in us-east-1 ──────────────────
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: nimbus
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets   # ESO controller SA — has IRSA annotation

# ── ExternalSecret: nimbus-secrets (auth, cart, order) ───────────────────────
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nimbus-secrets
  namespace: nimbus
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: nimbus-secrets          # creates/updates this Kubernetes Secret
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: nimbus-cluster/nimbus-secrets
        property: JWT_SECRET
    - secretKey: DATABASE_URL
      remoteRef:
        key: nimbus-cluster/nimbus-secrets
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: nimbus-cluster/nimbus-secrets
        property: REDIS_URL

# ── ExternalSecret: nimbus-catalog-secrets (catalog-service) ─────────────────
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nimbus-catalog-secrets
  namespace: nimbus
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: nimbus-catalog-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: nimbus-cluster/nimbus-catalog-secrets
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: nimbus-cluster/nimbus-catalog-secrets
        property: REDIS_URL
