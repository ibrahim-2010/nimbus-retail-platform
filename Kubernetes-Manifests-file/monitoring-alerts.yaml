apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nimbus-alerts
  namespace: monitoring
  labels:
    release: monitoring
    app: kube-prometheus-stack
spec:
  groups:
    - name: nimbus-application
      rules:
        # Alert: Pod replicas below desired count
        - alert: PodDown
          expr: >
            kube_deployment_status_replicas_available{namespace="nimbus"}
            < kube_deployment_spec_replicas{namespace="nimbus"}
          for: 1m
          labels:
            severity: critical
            team: devops
          annotations:
            summary: "Pod replica count below desired in {{ $labels.deployment }}"
            description: "Deployment {{ $labels.deployment }} has {{ $value }} available replicas"

        # Alert: High CPU usage across nimbus pods
        - alert: HighCPUUsage
          expr: >
            rate(container_cpu_usage_seconds_total{namespace="nimbus"}[5m]) > 0.8
          for: 2m
          labels:
            severity: warning
            team: devops
          annotations:
            summary: "High CPU usage in nimbus namespace"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using excessive CPU"

        # Alert: Pod is crash-looping
        - alert: PodCrashLooping
          expr: >
            rate(kube_pod_container_status_restarts_total{namespace="nimbus"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
            team: devops
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has been restarting"

        # Alert: High request error rate across NimbusRetail services
        - alert: HighErrorRate
          expr: >
            rate(http_requests_total{namespace="nimbus", status=~"5.."}[5m])
            / rate(http_requests_total{namespace="nimbus"}[5m]) > 0.05
          for: 2m
          labels:
            severity: critical
            team: devops
          annotations:
            summary: "High 5xx error rate on {{ $labels.job }}"
            description: "More than 5% of requests to {{ $labels.job }} are returning 5xx errors"

        # Alert: Kafka consumer lag
        - alert: KafkaConsumerLag
          expr: >
            kafka_consumergroup_lag{namespace="kafka"} > 100
          for: 5m
          labels:
            severity: warning
            team: devops
          annotations:
            summary: "Kafka consumer lag is high"
            description: "Consumer group {{ $labels.consumergroup }} lag is {{ $value }} messages"
