# NetworkPolicy for the ai namespace.
# Default-deny all ingress, then whitelist exactly two sources:
#   1. operator-copilot namespace — the MCP server that calls Ollama
#   2. monitoring namespace — Prometheus scraping /metrics
# Egress is open so Ollama can pull model weights from the internet on first load.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-ingress
  namespace: ai
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: operator-copilot
      ports:
        - port: 11434
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 11434
          protocol: TCP
  egress:
    - {}
