# Grafana dashboard — Ollama LLM metrics.
# The kube-prometheus-stack Grafana sidecar watches for ConfigMaps labelled
# grafana_dashboard: "1" in the monitoring namespace and auto-loads them.
# This ConfigMap must live in the monitoring namespace to be picked up.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ollama-dashboard.json: |
    {
      "title": "Ollama — LLM Inference",
      "uid": "ollama-pilot2",
      "tags": ["ollama", "llm", "pilot2"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Request Rate (req/s)",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "rate(ollama_requests_total[1m])",
              "legendFormat": "req/s"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Pending Requests",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "ollama_pending_requests_total",
              "legendFormat": "pending"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Response Latency",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(ollama_request_duration_seconds_bucket[5m]))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(ollama_request_duration_seconds_bucket[5m]))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, rate(ollama_request_duration_seconds_bucket[5m]))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Total Requests",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 6 },
          "targets": [
            {
              "expr": "increase(ollama_requests_total[5m])",
              "legendFormat": "requests (5m window)"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          }
        }
      ],
      "time": { "from": "now-1h", "to": "now" }
    }
