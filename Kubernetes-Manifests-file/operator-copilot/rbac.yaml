---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: operator-copilot
  namespace: operator-copilot
  labels:
    project: nimbus-retail-platform

---
# ClusterRole grants cross-namespace access — the copilot operates on
# nimbus, ai, monitoring, and cert-manager namespaces.
# In a stricter production setup, split this into per-namespace Roles
# and restrict secrets/delete to specific namespaces only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: operator-copilot
  labels:
    project: nimbus-retail-platform
rules:
  # list_pods, get_pod_logs, get_pod_events
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services"]
    verbs: ["get", "list", "watch"]

  # restart_pod — delete triggers controller recreation
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]

  # renew_certificate — deletes TLS Secret so cert-manager re-issues it
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["delete"]

  # describe_deployment, rollback_deployment (reads revision history via ReplicaSets)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]

  # scale_deployment
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]

  # rollback_deployment — patches pod template to match previous ReplicaSet
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]

  # get_certificate_expiry, renew_certificate
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch"]

  # get_pod_metrics — requires Metrics Server
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: operator-copilot
  labels:
    project: nimbus-retail-platform
subjects:
  - kind: ServiceAccount
    name: operator-copilot
    namespace: operator-copilot
roleRef:
  kind: ClusterRole
  name: operator-copilot
  apiGroup: rbac.authorization.k8s.io
