apiVersion: v1
kind: Pod
metadata:
  name: pod-with-latest-tag
  namespace: nimbus
  labels:
    app: test-service
spec:
  containers:
    - name: app
      image: nginx:latest
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "300m"
          memory: "256Mi"
