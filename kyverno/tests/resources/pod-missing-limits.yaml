apiVersion: v1
kind: Pod
metadata:
  name: pod-missing-limits
  namespace: nimbus
  labels:
    app: test-service
spec:
  containers:
    - name: app
      image: nginx:1.27.0
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        # limits block intentionally absent — should fail require-resource-limits
